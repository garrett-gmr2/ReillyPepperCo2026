<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReillyPepperCo — 2026 Harvest Dibs</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFFDF8;
    --surface: #F5EFE6;
    --surface2: #EDE3D4;
    --border: #D4BFA0;
    --border-light: #E8D9C4;
    --text: #2C1A0E;
    --text-muted: #7A5C40;
    --text-faint: #A08060;
    --red: #993C1D;
    --red-dark: #7A3120;
    --red-light: #FAECE7;
    --red-mid: #D85A30;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --gray-light: #F1EFE8;
    --gray-mid: #888780;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A120A;
      --surface: #251A10;
      --surface2: #30231A;
      --border: #5A3E28;
      --border-light: #3D2A1A;
      --text: #F0E4D4;
      --text-muted: #B08060;
      --text-faint: #806040;
      --red-light: #3D1A10;
      --green-light: #0A2004;
      --gray-light: #221A14;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
  }

  .page { max-width: 860px; margin: 0 auto; padding: 0 1rem 3rem; }

  /* Header */
  .header { text-align: center; padding: 2.5rem 1rem 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
  .header-eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px; }
  .header-logo { font-size: 36px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
  .header-logo em { color: var(--red); font-style: normal; }
  .header-divider { width: 40px; height: 2px; background: var(--red); margin: 14px auto; border-radius: 2px; }
  .header-tagline { font-size: 15px; color: var(--text-muted); line-height: 1.5; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 2rem; }
  .stat-box { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 1rem; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); margin-top: 3px; }

  /* Section */
  .section-hd { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); }

  /* Grid */
  .plant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; margin-bottom: 2rem; }

  /* Card */
  .pcard { background: var(--bg); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 1.1rem; transition: border-color 0.15s, box-shadow 0.15s; }
  .pcard:not(.is-out):hover { border-color: var(--border); }
  .pcard.is-out { opacity: 0.55; }
  .pcard-icon { font-size: 22px; color: var(--red); margin-bottom: 6px; }
  .pcard-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .pcard-cat { font-size: 11px; color: var(--text-faint); margin-bottom: 10px; letter-spacing: 0.04em; text-transform: uppercase; }

  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; margin-bottom: 8px; letter-spacing: 0.04em; }
  .badge-avail { background: var(--green-light); color: var(--green); }
  .badge-out { background: var(--gray-light); color: var(--gray-mid); }

  /* Pips */
  .pip-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .pip { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .pip.taken { background: var(--red); border-color: var(--red-dark); }

  /* Claims list */
  .claims { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.7; }
  .claim-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 3px; }
  .claim-name { font-weight: 600; color: var(--text); }
  .claim-detail { color: var(--text-faint); }

  /* Buttons */
  .btn-claim { width: 100%; background: var(--red); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 0; font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s; }
  .btn-claim:hover { background: var(--red-dark); }
  .btn-claim:disabled { background: var(--surface2); color: var(--text-faint); cursor: default; }

  /* Overlay modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.active { display: flex; }
  .modal { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; width: 100%; max-width: 380px; }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: var(--text-faint); margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
  .form-group input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .form-group input:focus { border-color: var(--red); }
  .modal-actions { display: flex; gap: 10px; margin-top: 1.25rem; }
  .btn-confirm { flex: 1; background: var(--red); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-confirm:hover { background: var(--red-dark); }
  .btn-cancel { flex: 1; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; font-size: 13px; cursor: pointer; transition: background 0.15s; }
  .btn-cancel:hover { background: var(--surface); }
  .modal-err { font-size: 11px; color: var(--red); margin-top: 10px; min-height: 16px; }

  /* Footer */
  .footer { text-align: center; font-size: 11px; color: var(--text-faint); margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-light); letter-spacing: 0.06em; }

  @media (max-width: 480px) {
    .plant-grid { grid-template-columns: 1fr 1fr; }
    .stats-row { gap: 8px; }
    .stat-num { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-eyebrow">2026 Harvest &nbsp;&bull;&nbsp; Friends &amp; Family</div>
    <div class="header-logo">Reilly<em>Pepper</em>Co</div>
    <div class="header-divider"></div>
    <div class="header-tagline">Pick your plants before they're gone.<br>Claim dibs below — first come, first served.</div>
  </header>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">Total plants</div></div>
    <div class="stat-box"><div class="stat-num" id="st-claimed">0</div><div class="stat-lbl">Claimed</div></div>
    <div class="stat-box"><div class="stat-num" id="st-left">0</div><div class="stat-lbl">Remaining</div></div>
  </div>

  <div class="section-hd">Peppers</div>
  <div class="plant-grid" id="grid-peppers"></div>

  <div class="section-hd">Tomatoes</div>
  <div class="plant-grid" id="grid-tomatoes"></div>

  <div class="footer">ReillyPepperCo &nbsp;&bull;&nbsp; Kansas City, Missouri &nbsp;&bull;&nbsp; etsy.com/shop/reillypepperco</div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="m-title"></div>
    <div class="modal-sub" id="m-sub"></div>
    <div class="form-group">
      <label>Your name</label>
      <input type="text" id="m-name" placeholder="e.g. Sarah" maxlength="40" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Pickup date</label>
      <input type="date" id="m-date" />
    </div>
    <div class="form-group">
      <label>How many? <span id="m-qty-hint" style="font-weight:400;text-transform:none;letter-spacing:0"></span></label>
      <input type="number" id="m-qty" min="1" value="1" />
    </div>
    <div class="modal-err" id="m-err"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="m-cancel">Cancel</button>
      <button class="btn-confirm" id="m-confirm">Claim dibs</button>
    </div>
  </div>
</div>

<script>
const CATALOG = [
  {id:'ghost-jal',  name:'Ghost jalapeño',    cat:'pepper', total:4, icon:'ti-flame'},
  {id:'jal',        name:'Jalapeño',           cat:'pepper', total:3, icon:'ti-leaf'},
  {id:'banana',     name:'Sweet banana',       cat:'pepper', total:1, icon:'ti-sun'},
  {id:'trinidad',   name:'Trinidad scorpion',  cat:'pepper', total:5, icon:'ti-skull'},
  {id:'aji',        name:'Aji guyana',         cat:'pepper', total:8, icon:'ti-plant-2'},
  {id:'brazilian',  name:'Brazilian starfish', cat:'pepper', total:1, icon:'ti-star'},
  {id:'hab',        name:'Habanero',           cat:'pepper', total:5, icon:'ti-droplet'},
  {id:'brandywine', name:'Brandywine tomato',  cat:'tomato', total:6, icon:'ti-circle'},
  {id:'beefsteak',  name:'Beefsteak tomato',   cat:'tomato', total:2, icon:'ti-circle'},
  {id:'cherry',     name:'Cherry tomato',      cat:'tomato', total:6, icon:'ti-circle'},
  {id:'unknown',    name:'Unknown tomato',     cat:'tomato', total:4, icon:'ti-help-circle'},
];

const KEY = 'rpc_dibs_2026_v1';
function load(){ try{ return JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ return {}; } }
function save(d){ try{ localStorage.setItem(KEY, JSON.stringify(d)); }catch(e){} }

let state = load();
CATALOG.forEach(p => { if(!state[p.id]) state[p.id] = []; });

let activeId = null;

function freeFor(id){
  const p = CATALOG.find(x=>x.id===id);
  const used = (state[id]||[]).reduce((s,c)=>s+c.qty,0);
  return p.total - used;
}

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderCard(p){
  const free = freeFor(p.id);
  const out = free <= 0;
  const claims = state[p.id]||[];
  const used = p.total - free;

  let pips = '';
  let takenCount = 0;
  claims.forEach(c => {
    for(let i=0;i<c.qty;i++){
      pips += `<span class="pip taken" title="${esc(c.name)}"></span>`;
      takenCount++;
    }
  });
  for(let i=takenCount;i<p.total;i++) pips += `<span class="pip"></span>`;

  let claimsList = '';
  if(claims.length){
    claimsList = '<div class="claims">';
    claims.forEach(c => {
      const dateStr = c.date ? ` &mdash; pickup ${c.date}` : '';
      claimsList += `<div class="claim-row"><span class="claim-name">${esc(c.name)}</span><span class="claim-detail">&nbsp;(${c.qty} plant${c.qty>1?'s':''})${dateStr}</span></div>`;
    });
    claimsList += '</div>';
  }

  const badge = out
    ? `<span class="badge badge-out">None remaining</span>`
    : `<span class="badge badge-avail">${free} of ${p.total} available</span>`;

  const btn = out
    ? `<button class="btn-claim" disabled>None remaining</button>`
    : `<button class="btn-claim" onclick="openModal('${p.id}')">Claim dibs</button>`;

  return `<div class="pcard${out?' is-out':''}">
    <div class="pcard-icon"><i class="ti ${p.icon}"></i></div>
    <div class="pcard-name">${esc(p.name)}</div>
    ${badge}
    <div class="pip-row">${pips}</div>
    ${claimsList}
    ${btn}
  </div>`;
}

function renderStats(){
  const total = CATALOG.reduce((s,p)=>s+p.total,0);
  const claimed = CATALOG.reduce((s,p)=>{
    return s + (state[p.id]||[]).reduce((a,c)=>a+c.qty,0);
  },0);
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-claimed').textContent = claimed;
  document.getElementById('st-left').textContent = total - claimed;
}

function render(){
  renderStats();
  ['pepper','tomato'].forEach(cat => {
    const id = cat==='pepper' ? 'grid-peppers' : 'grid-tomatoes';
    document.getElementById(id).innerHTML = CATALOG.filter(p=>p.cat===cat).map(renderCard).join('');
  });
}

function openModal(id){
  activeId = id;
  const p = CATALOG.find(x=>x.id===id);
  const free = freeFor(id);
  document.getElementById('m-title').textContent = p.name;
  document.getElementById('m-sub').textContent = `${free} plant${free!==1?'s':''} still available`;
  document.getElementById('m-qty').max = free;
  document.getElementById('m-qty').value = 1;
  document.getElementById('m-qty-hint').textContent = `(max ${free})`;
  document.getElementById('m-name').value = '';
  document.getElementById('m-date').value = '';
  document.getElementById('m-err').textContent = '';
  document.getElementById('overlay').classList.add('active');
  setTimeout(()=>document.getElementById('m-name').focus(), 50);
}

document.getElementById('m-cancel').onclick = () => {
  document.getElementById('overlay').classList.remove('active');
  activeId = null;
};

document.getElementById('overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('overlay')){
    document.getElementById('overlay').classList.remove('active');
    activeId = null;
  }
});

document.getElementById('m-confirm').onclick = () => {
  const name = document.getElementById('m-name').value.trim();
  const date = document.getElementById('m-date').value;
  const qty = parseInt(document.getElementById('m-qty').value)||0;
  const err = document.getElementById('m-err');
  const free = freeFor(activeId);
  if(!name){ err.textContent = 'Please enter your name.'; return; }
  if(qty < 1 || qty > free){ err.textContent = `Please choose between 1 and ${free} plants.`; return; }
  state[activeId].push({name, date, qty});
  save(state);
  document.getElementById('overlay').classList.remove('active');
  activeId = null;
  render();
};

document.addEventListener('keydown', e => {
  if(e.key === 'Escape') document.getElementById('overlay').classList.remove('active');
  if(e.key === 'Enter' && document.getElementById('overlay').classList.contains('active')){
    document.getElementById('m-confirm').click();
  }
});

render();
</script>
</body>
</html>
